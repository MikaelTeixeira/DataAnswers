services:
  mysql:
    image: mysql:8.4
    container_name: mensagens_automaticas_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: mensagens_automaticas
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
