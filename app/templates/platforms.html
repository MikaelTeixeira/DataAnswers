{% extends "base.html" %}

{% block content %}
<section class="admin-page">
  <div class="section-heading">
    <div>
      <p class="eyebrow">Administracao</p>
      <h1>Plataformas</h1>
    </div>
  </div>

  {% if error %}
    <p class="alert">{{ error }}</p>
  {% endif %}

  <form class="admin-form" method="post" action="/admin/platforms">
    <div class="form-grid">
      <label>
        Nova plataforma
        <input name="name" type="text" placeholder="Ex: SAS" required>
      </label>
    </div>
    <button class="primary-button" type="submit">Adicionar</button>
  </form>

  <div class="platform-list">
    {% for platform in platforms %}
      <article class="platform-row">
        <form id="platformUpdate{{ platform.id }}" method="post" action="/admin/platforms/{{ platform.id }}/update">
          <div class="form-grid">
            <label>
              Nome
              <input name="name" type="text" value="{{ platform.name }}" required>
            </label>
          </div>
        </form>
        <div class="card-actions record-actions">
          <label class="check-row">
            <input form="platformUpdate{{ platform.id }}" name="is_active" type="checkbox" {% if platform.is_active %}checked{% endif %}>
            Ativa
          </label>
          <button class="primary-button" form="platformUpdate{{ platform.id }}" type="submit">Salvar</button>
          <form method="post" action="/admin/platforms/{{ platform.id }}/delete">
            <button class="delete-button" type="submit">Excluir</button>
          </form>
        </div>
      </article>
    {% else %}
      <p class="muted">Nenhuma plataforma cadastrada.</p>
    {% endfor %}
  </div>
</section>
{% endblock %}
